<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Suppliers</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <div th:replace="~{fragments/nav :: navbar}"></div>

    <h1>Suppliers</h1>

    <a class="button" th:href="@{/suppliers/new}">+ New Supplier</a>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Contact Person</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Address</th>
                <th class="w-150">Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(suppliers)}">
                <td colspan="7">No suppliers yet.</td>
            </tr>
            <tr th:each="supplier : ${suppliers}">
                <td th:text="${supplier.id}">1</td>
                <td th:text="${supplier.name}">Supplier Name</td>
                <td th:text="${supplier.contactPerson}">Contact</td>
                <td th:text="${supplier.email}">email@example.com</td>
                <td th:text="${supplier.phone}">123456789</td>
                <td th:text="${supplier.address}">Address</td>
                <td class="action-btns">
                    <a th:href="@{'/suppliers/edit/' + ${supplier.id}}" class="icon-btn btn-edit" data-tooltip="Edit">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                    </a>
                    <form th:action="@{'/suppliers/delete/' + ${supplier.id}}" method="post" class="inline-form">
                        <button type="submit" class="icon-btn btn-delete" data-tooltip="Delete"
                            onclick="return confirm('Are you sure you want to delete this supplier?');">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path
                                    d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                                </path>
                                <line x1="10" y1="11" x2="10" y2="17"></line>
                                <line x1="14" y1="11" x2="14" y2="17"></line>
                            </svg>
                        </button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

</body>

</html>
