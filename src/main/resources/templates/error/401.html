<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>401 Unauthorized - Inventory System</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .error-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 100px);
            text-align: center;
            padding: 20px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        .error-message {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .error-description {
            color: var(--text-muted);
            max-width: 500px;
            margin-bottom: 32px;
        }

        .icon-box {
            background-color: var(--danger-bg);
            color: var(--danger-text);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 32px;
        }
    </style>
</head>

<body>

    <div class="nav">
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/logout}" class="logout-link">Logout</a>
    </div>

    <div class="error-wrapper">
        <div class="icon-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>
        <div class="error-code">401</div>
        <div class="error-message">Access Denied</div>
        <div class="error-description">
            Oops! It seems you don't have the necessary permissions to access this page.
            Your current session or role level is insufficient for this specific area.
        </div>
        <a th:href="@{/dashboard}" class="button">Return to Dashboard</a>
    </div>

</body>

</html>
