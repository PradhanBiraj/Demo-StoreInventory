<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create User</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <div class="nav">
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/users}">Back to Users</a>
        <a th:href="@{/logout}" class="logout-link">Logout</a>
    </div>

    <h1>Create User</h1>

    <div th:if="${errorMessage}">
        <p class="error" th:text="${errorMessage}">Error message</p>
    </div>

    <form th:action="@{/users}" method="post">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" th:value="${username}" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />

        <label for="name">Name</label>
        <input id="name" name="name" type="text" th:value="${name}" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" th:value="${email}" required />

        <label for="contact">Contact</label>
        <input id="contact" name="contact" type="text" th:value="${contact}" required />

        <label for="roleKey">Role</label>
        <select id="roleKey" name="roleKey">
            <option value="ADMIN" th:selected="${roleKey == 'ADMIN'}">ADMIN</option>
            <option value="STAFF" th:selected="${roleKey == 'STAFF'}">STAFF</option>
        </select>

        <button type="submit">Create User</button>
    </form>

</body>

</html>
