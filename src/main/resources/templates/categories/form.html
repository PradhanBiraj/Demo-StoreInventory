<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${formTitle}">Category Form</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <div class="nav">
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/categories}">Back to Categories</a>
        <a th:href="@{/logout}" class="logout-link">Logout</a>
    </div>

    <h1 th:text="${formTitle}">Category</h1>

    <form th:object="${category}"
        th:action="${category.id} != null ? @{'/categories/update/' + ${category.id}} : @{/categories}" method="post">

        <label for="name">Name</label>
        <input type="text" id="name" th:field="*{name}" required />

        <label for="description">Description</label>
        <textarea id="description" th:field="*{description}" rows="3"></textarea>

        <button type="submit">Save</button>
    </form>

</body>

</html>
