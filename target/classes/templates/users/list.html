<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>User Management</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <div th:replace="~{fragments/nav :: navbar}"></div>

    <h1>User Management</h1>

    <a class="button" th:href="@{/users/new}">+ New User</a>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Enabled</th>
                <th>Roles</th>
                <th class="w-150">Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="4">No users found.</td>
            </tr>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}">1</td>
                <td th:text="${user.username}">username</td>
                <td th:text="${user.enabled}">true</td>
                <td>
                    <span th:each="r, iterStat : ${user.roles}" th:text="${r.name}"
                        th:append="${!iterStat.last ? ', ' : ''}">
                        ROLE_ADMIN
                    </span>
                </td>
                <td class="action-btns">
                    <form th:action="@{'/users/delete/' + ${user.id}}" method="post" class="inline-form">
                        <button type="submit" class="icon-btn btn-delete" data-tooltip="Delete"
                            onclick="return confirm('Delete this user?');">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path
                                    d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                                </path>
                                <line x1="10" y1="11" x2="10" y2="17"></line>
                                <line x1="14" y1="11" x2="14" y2="17"></line>
                            </svg>
                        </button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

</body>

</html>
