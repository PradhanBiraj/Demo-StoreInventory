<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Items</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

    <div th:replace="~{fragments/nav :: navbar}"></div>

    <h1>Items</h1>

    <form method="get" th:action="@{/items}" class="filter-form">
        <input type="text" name="search" placeholder="Search by name" th:value="${search}" />
        <label>
            <input type="checkbox" name="lowStock" value="true" th:checked="${lowStock}" /> Low stock only
        </label>
        <button type="submit">Filter</button>
    </form>

    <a class="button" th:href="@{/items/new}">+ New Item</a>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Supplier</th>
                <th>Quantity</th>
                <th>Unit Price</th>
                <th class="w-220">Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(items)}">
                <td colspan="6">No items yet.</td>
            </tr>
            <tr th:each="item : ${items}" th:classappend="${item.quantity} &lt;= 5 ? 'low-stock-row' : ''">
                <td th:text="${item.name}">Item Name</td>
                <td th:text="${item.category != null ? item.category.name : '—'}">Category</td>
                <td th:text="${item.supplier != null ? item.supplier.name : '—'}">Supplier</td>
                <td th:text="${item.quantity}">0</td>
                <td th:text="${item.unitPrice}">0.00</td>
                <td class="action-btns">
                    <a th:href="@{'/items/edit/' + ${item.id}}" class="icon-btn btn-edit" data-tooltip="Edit">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                    </a>
                    <a th:href="@{'/stock/in/' + ${item.id}}" class="icon-btn btn-stock-in" data-tooltip="Stock In">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="16"></line>
                            <line x1="8" y1="12" x2="16" y2="12"></line>
                        </svg>
                    </a>
                    <a th:href="@{'/stock/out/' + ${item.id}}" class="icon-btn btn-stock-out" data-tooltip="Stock Out">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="8" y1="12" x2="16" y2="12"></line>
                        </svg>
                    </a>
                    <a th:href="@{'/stock/history/' + ${item.id}}" class="icon-btn btn-history" data-tooltip="History">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                            <polyline points="3 3 3 8 8 8"></polyline>
                            <polyline points="12 7 12 12 15 15"></polyline>
                        </svg>
                    </a>
                    <form th:action="@{'/items/delete/' + ${item.id}}" method="post" class="inline-form">
                        <button type="submit" class="icon-btn btn-delete" data-tooltip="Delete"
                            onclick="return confirm('Delete this item?');">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path
                                    d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                                </path>
                                <line x1="10" y1="11" x2="10" y2="17"></line>
                                <line x1="14" y1="11" x2="14" y2="17"></line>
                            </svg>
                        </button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

</body>

</html>
